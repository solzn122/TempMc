<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcticsystem Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #070a13;
    --bg2: #02040a;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.10);
    --text: #e8eefc;
    --muted: #9aa6c1;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --good: #39d98a;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    background:
        radial-gradient(circle at 20% 20%, #18213a, transparent 40%),
        radial-gradient(circle at 80% 70%, #1b1030, transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
}

/* animated glow blobs */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 360px;
    height: 360px;
    filter: blur(100px);
    opacity: 0.35;
    z-index: 0;
    animation: floatGlow 12s ease-in-out infinite alternate;
}

body::before {
    background: #60a5fa;
    top: -120px;
    left: -120px;
}

body::after {
    background: #a78bfa;
    bottom: -120px;
    right: -120px;
}

@keyframes floatGlow {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(30px,-20px) scale(1.1); }
}

.container {
    position: relative;
    z-index: 1;
    width: 92%;
    max-width: 560px;
    animation: fadeUp 0.9s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    background: linear-gradient(145deg,
        rgba(255,255,255,0.07),
        rgba(255,255,255,0.02)
    );
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 30px;
    backdrop-filter: blur(12px);
    box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
}

/* subtle shine */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -40%;
    width: 180%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
}

h1 {
    font-size: 1.5rem;
    letter-spacing: -0.3px;
    font-weight: 600;
    background: linear-gradient(90deg, #e8eefc, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    margin-top: 8px;
    font-size: 0.9rem;
    color: var(--muted);
    opacity: 0.8;
}

.status {
    margin-top: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--good);
    background: rgba(57,217,138,0.08);
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(57,217,138,0.25);
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 10px var(--good);
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(57,217,138,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(57,217,138,0); }
    100% { box-shadow: 0 0 0 0 rgba(57,217,138,0); }
}

.links {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--text);
    background: linear-gradient(180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.03)
    );
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    cursor: pointer;
}

a:hover {
    transform: translateY(-2px) scale(1.01);
    border-color: rgba(96,165,250,0.5);
    box-shadow:
        0 12px 30px rgba(96,165,250,0.18),
        0 0 0 1px rgba(96,165,250,0.25);
}

.tag {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.8;
}

.footer {
    margin-top: 18px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    opacity: 0.85;
}

.section-title {
    margin-top: 18px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>arcticsystem MC Launcher BETA</h1>
        <div class="sub">Hosted by Winterfallfurry • Web Clients</div>

        <div class="status">
            <span class="dot"></span>
            Clients ONLINE
        </div>

        <div class="section-title">Clients</div>

        <div class="links" id="links"></div>

        <div class="footer">
            Winterfallfurry • arcticsystem MC Launcher BETA • 2026 ©
        </div>

    </div>
</div>

<script>
const clients = [
    {
        name: "Modern Client (1.12.2)",
        url: "modern/modern.htm",
        tag: "stable"
    },
    {
        name: "Shadow NET Client 4.2 (1.8.8)",
        url: "shadow/index.html",
        tag: "beta"
    },
    {
        name: "Tuff Client (1.12.2)",
        url: "tuff/index.html",
        tag: "stable"
    }
];

const container = document.getElementById("links");

clients.forEach(c => {
    const a = document.createElement("a");
    a.href = c.url;

    a.innerHTML = `
        ${c.name}
        <span class="tag">${c.tag}</span>
    `;

    container.appendChild(a);
});
</script>

</body>
</html>
