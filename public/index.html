<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcticsystem Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #070a13;
    --bg2: #02040a;
    --text: #e8eefc;
    --muted: #9aa6c1;
    --good: #39d98a;
    --radius-md: 14px;
    --radius-lg: 18px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);

    background:
        radial-gradient(circle at 20% 20%, #18213a, transparent 45%),
        radial-gradient(circle at 80% 70%, #1b1030, transparent 40%),
        linear-gradient(180deg, var(--bg1), var(--bg2));

    animation: bgShift 18s ease-in-out infinite;
}

@keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::before,
body::after {
    content: "";
    position: absolute;
    width: 380px;
    height: 380px;
    filter: blur(110px);
    opacity: 0.35;
    z-index: 0;
}

body::before {
    background: #60a5fa;
    top: -140px;
    left: -120px;
}

body::after {
    background: #a78bfa;
    bottom: -140px;
    right: -120px;
}

.grid {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
}

.vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center,
        transparent 35%,
        rgba(0,0,0,0.65) 100%);
    z-index: 0;
}

.orb {
    position: absolute;
    width: 320px;
    height: 320px;
    background: #38bdf8;
    filter: blur(120px);
    opacity: 0.18;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    width: 92%;
    max-width: 560px;
}

.card {
    background: linear-gradient(145deg,
        rgba(255,255,255,0.07),
        rgba(255,255,255,0.02)
    );

    border: 1px solid rgba(255,255,255,0.10);
    border-radius: var(--radius-lg);
    padding: 30px;
    backdrop-filter: blur(12px);
}

h1 {
    font-size: 1.55rem;
    font-weight: 600;
    background: linear-gradient(90deg, #e8eefc, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    margin-top: 8px;
    font-size: 0.9rem;
    color: var(--muted);
}

.status {
    margin-top: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--good);
}

.dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--good);
}

.links {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--text);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

/* BADGES */
.badge {
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
}

.badge.dev { color:#38bdf8; background:rgba(56,189,248,0.08); }
.badge.planned { color:#a78bfa; background:rgba(167,139,250,0.08); }
.badge.soon { color:#fbbf24; background:rgba(251,191,36,0.08); }
.badge.stable { color:#10b981; background:rgba(16,185,129,0.08); }
.badge.beta { color:#6366f1; background:rgba(99,102,241,0.08); }

.badge.works { color:#f472b6; background:rgba(244,114,182,0.08); }

/* FIXED GROUP */
.badge-group {
    display: flex;
    gap: 6px;
    align-items: center;
}

.section-title {
    margin-top: 22px;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
}

.upcoming {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.upcoming-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
}

.upcoming-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.info {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 220px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.75rem;
    color: var(--muted);
    z-index: 999;
}

.info b { color: var(--text); }
</style>
</head>

<body>

<div class="orb"></div>
<div class="vignette"></div>
<div class="grid"></div>

<div class="info">
<b>System Info</b><br>
Host: <span id="host"></span><br>
Page: <span id="page"></span><br>
Browser: <span id="browser"></span><br>
Ping: <span id="ping"></span>ms
</div>

<div class="container">
<div class="card">

<h1>arcticsystem MC Launcher BETA</h1>
<div class="sub">Hosted by Winterfallfurry • Web Clients</div>

<div class="status">
<span class="dot"></span>
Clients ONLINE | Fully Updated
</div>

<div class="links" id="links"></div>

<div class="section-title">Upcoming</div>
<div class="upcoming" id="upcoming"></div>

<div style="margin-top:12px;">
<span class="badge works">IN THE WORKS</span>
</div>

</div>
</div>

<script>
const clients = [
    { name: "Modern Client (1.12.2)", url: "modern/modern.htm", status: "stable" },
    { name: "Shadow NET Client 4.2 (1.8.8)", url: "shadow/index.html", status: "beta" },
    { name: "Tuff Client (1.12.2)", url: "tuff/index.html", status: "stable" }
];

const upcoming = [
    { title: "Minecraft 26.1.2", desc: "Modern Version Port", status: ["In the works", "planned"] },
    { title: "More Clients", desc: "Please email for requests", status: "planned" },
    { title: "Custom Client..?", desc: "Possible custom client winterfallfurry makes.", status: "dev" }
];

const linksContainer = document.getElementById("links");

clients.forEach(c => {
    const a = document.createElement("a");
    a.href = c.url;

    a.innerHTML = `
        ${c.name}
        <span class="badge ${c.status}">${c.status}</span>
    `;

    linksContainer.appendChild(a);
});

const upcomingContainer = document.getElementById("upcoming");

upcoming.forEach(u => {
    const div = document.createElement("div");
    div.className = "upcoming-item";

    div.innerHTML = `
        <div class="upcoming-left">
            <div>${u.title}</div>
            <div>${u.desc}</div>
        </div>

        <div class="badge-group">
            ${
                Array.isArray(u.status)
                ? u.status.map(s => `<span class="badge ${s}">${s}</span>`).join("")
                : `<span class="badge ${u.status}">${u.status}</span>`
            }
        </div>
    `;

    upcomingContainer.appendChild(div);
});

document.getElementById("host").textContent = location.hostname;
document.getElementById("page").textContent = location.pathname;
document.getElementById("browser").textContent = navigator.userAgent.slice(0, 18);
document.getElementById("ping").textContent = Math.floor(20 + Math.random()*60);
</script>

</body>
</html>
